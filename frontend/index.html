<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gifraffe</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fdf8f0; color: #2c1a0e; }
      :focus-visible {
        outline: 2px solid #d4880a;
        outline-offset: 2px;
        border-radius: 4px;
      }
      :root {
        /* Brand colors */
        --color-amber: #d4880a;
        --color-amber-light: #f5a623;
        --color-amber-muted: #e8c97a;
        --color-cream: #fdf8f0;
        --color-cream-card: #fffdf5;
        --color-cream-chip: #f5e6c0;
        --color-cream-nav: #fff3d0;
        --color-brown-dark: #2c1a0e;
        --color-brown-mid: #5a3a10;
        --color-brown-light: #7a4f1a;
        --color-brown-faint: #b8832a;

        /* State colors */
        --color-disabled: #e0c87a;
        --color-disabled-text: #a07830;
        --color-error: #c0392b;
        --color-error-bg: #fff0f0;
        --color-error-border: #f5c6c6;
        --color-success: #27ae60;
        --color-success-bg: #f0fff4;
        --color-success-border: #a3e4b0;

        /* Spacing / shape */
        --radius-sm: 8px;
        --radius-md: 10px;
        --radius-lg: 12px;
        --radius-pill: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
